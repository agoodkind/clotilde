name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: make test

      - uses: 1password/load-secrets-action/configure@v3
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          MACOS_SIGN_P12: op://CI/macOS Release Signing and Notarization CI/macos_sign_p12_single
          MACOS_SIGN_PASSWORD: op://CI/macOS Release Signing and Notarization CI/MACOS_SIGN_PASSWORD
          MACOS_NOTARY_KEY: op://CI/macOS Release Signing and Notarization CI/MACOS_NOTARY_KEY
          MACOS_NOTARY_KEY_ID: op://CI/macOS Release Signing and Notarization CI/MACOS_NOTARY_KEY_ID
          MACOS_NOTARY_ISSUER_ID: op://CI/macOS Release Signing and Notarization CI/MACOS_NOTARY_ISSUER_ID

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
