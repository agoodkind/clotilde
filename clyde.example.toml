# Reference [adapter] stanza for ~/.config/clyde/config.toml.
#
# Copy sections into your
# config; the adapter refuses to start when required tables are
# missing ([adapter.families], [adapter.client_identity], [adapter.oauth]
# when direct_oauth = true).
#
# Bootstrap:
#   cat clyde.example.toml >> ~/.config/clyde/config.toml
#   $EDITOR ~/.config/clyde/config.toml
#   launchctl kickstart -k gui/$UID/io.goodkind.clyde
#
# Operator note: [adapter.oauth] and the stainless/* / cc_* fields under
# [adapter.client_identity] must match the canonical desktop client you
# use for login (capture from your environment or vendor docs).

[logging]
level = "debug"

[logging.rotation]
enabled = true
max_size_mb = 64
max_backups = 192
max_age_days = 14
compress = true

# Optional per-process log file overrides.
# Defaults:
#   TUI and CLI commands -> $XDG_STATE_HOME/clyde/clyde-tui.jsonl
#   daemon command       -> $XDG_STATE_HOME/clyde/clyde-daemon.jsonl
[logging.paths]
tui = ""
daemon = ""

[logging.body]
mode = "summary"
max_kb = 32

[adapter]
enabled = true
direct_oauth = true
default_model = "clyde-opus-4-7"

[adapter.notices]
enabled = true

[adapter.codex]
enabled = true
native_model_routing = "codex"
model_prefixes = ["gpt-", "o"]

# GPT/Codex model aliases are config-owned. `tokens` is the advertised
# catalog window; `observed_tokens` is the Responses HTTP window Clyde
# should expose when HTTP is the active Codex transport.
[[adapter.codex.models]]
alias_prefix = "gpt-5.4"
model = "gpt-5.4"
efforts = ["low", "medium", "high", "xhigh"]
max_output_tokens = 128000
contexts = [
  { tokens = 1000000, observed_tokens = 272000, alias_suffix = "1m", advertised_native_aliases = ["gpt-5.4"] },
]

[[adapter.codex.models]]
alias_prefix = "codex-5.5"
model = "gpt-5.5"
efforts = ["low", "medium", "high", "xhigh"]
max_output_tokens = 128000
contexts = [
  { tokens = 272000, native_aliases = ["gpt-5.5"] },
]

# Optional: forward otherwise-unknown model aliases to one
# OpenAI-compatible upstream. The caller's model value is preserved unless
# model is set.
[adapter.openai_compat_passthrough]
base_url = "http://[::1]:1234/v1"
api_key = ""
api_key_env = ""
model = ""

# Optional: route specific model aliases to named passthrough overrides.
# Use backend = "passthrough_override" when you want the model entry to
# be explicit even if passthrough_override is present.
# [adapter.passthrough_overrides.local]
# base_url = "http://localhost:1234/v1"
# api_key = ""
# api_key_env = ""
# model = "local-model"
#
# [adapter.models.gpt-local]
# backend = "passthrough_override"
# passthrough_override = "local"

[adapter.oauth]
token_url = "https://REDACTED-OAUTH-HOST/v1/oauth/token"
messages_url = "https://REDACTED-UPSTREAM/v1/messages"
client_id = "REDACTED-CLIENT-ID"
anthropic_beta = "REDACTED-OAUTH-BETA"
anthropic_version = "2023-06-01"
keychain_service = "REDACTED-KEYCHAIN"
scopes = [
  "user:profile",
  "user:inference",
  "user:sessions:claude_code",
  "user:mcp_servers",
  "user:file_upload",
]

[adapter.client_identity]
beta_header = "REDACTED-OAUTH-BETA,REDACTED-CC-BETA,effort-2025-11-24"
user_agent = "REDACTED-UA"
system_prompt_prefix = "REDACTED-SYSTEM-PREFIX"
stainless_package_version = "0.81.0"
stainless_runtime = "node"
stainless_runtime_version = "v24.3.0"
cc_version = "2.1.114"
cc_entrypoint = "sdk-cli"

[adapter.client_identity.per_context_betas]
"[1m]" = "REDACTED-1M-BETA"

# Per-backend handling of the OpenAI logprobs / top_logprobs
# request fields. "reject" returns 400 when the caller sets
# logprobs; "drop" silently strips the field. OpenAI-compatible
# passthrough routes pass through verbatim regardless of this stanza.
[adapter.logprobs]
anthropic = "reject"

# opus-4-6: adaptive/default/enabled/disabled thinking, low/medium/high/max
# effort, 200k context plus 1M beta. Claude Code upstream names this exact
# family "claude-opus-4-6". Verified against bundled upstream docs 2026-04-24.
[adapter.families.opus-4-6]
model = "claude-opus-4-6"
supports_tools = true
supports_vision = true
efforts = ["low", "medium", "high", "max"]
thinking_modes = ["default", "adaptive", "enabled", "disabled"]
max_output_tokens = 128000
contexts = [
  { tokens = 200000, alias_suffix = "", wire_suffix = "" },
  { tokens = 1000000, alias_suffix = "1m", wire_suffix = "[1m]" },
]

# opus-4-7: low/medium/high/max effort, all four thinking modes,
# 200k and 1M context. Empirically the highest-capability family on
# the account. Verified 2026-04-18.
[adapter.families.opus-4-7]
model = "claude-opus-4-7"
supports_tools = true
supports_vision = true
efforts = ["low", "medium", "high", "max"]
thinking_modes = ["default", "adaptive", "enabled", "disabled"]
max_output_tokens = 32000
contexts = [
  { tokens = 200000, alias_suffix = "", wire_suffix = "" },
  { tokens = 1000000, alias_suffix = "1m", wire_suffix = "[1m]" },
]

# sonnet-4-6: same effort + thinking matrix as opus-4-7, single
# 200k context. Verified 2026-04-18.
[adapter.families.sonnet-4-6]
model = "claude-sonnet-4-6"
supports_tools = true
supports_vision = true
efforts = ["low", "medium", "high", "max"]
thinking_modes = ["default", "adaptive", "enabled", "disabled"]
max_output_tokens = 64000
contexts = [{ tokens = 200000, alias_suffix = "", wire_suffix = "" }]

# haiku-4-5: server rejects effort
# (`400 This model does not support the effort parameter`) and
# adaptive thinking. Enabled and disabled thinking work; default
# omits the block. Verified 2026-04-18.
[adapter.families.haiku-4-5]
model = "claude-haiku-4-5-20251001"
supports_tools = true
supports_vision = true
efforts = []
thinking_modes = ["default", "enabled", "disabled"]
max_output_tokens = 16000
contexts = [{ tokens = 200000, alias_suffix = "", wire_suffix = "" }]
