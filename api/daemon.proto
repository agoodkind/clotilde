syntax = "proto3";

package agentgate;

option go_package = "github.com/fgrehm/clotilde/api/daemonpb";

service AgentGateD {
  rpc AcquireSession(AcquireSessionRequest) returns (AcquireSessionResponse);
  rpc ReleaseSession(ReleaseSessionRequest) returns (ReleaseSessionResponse);
  rpc HookEvent(HookEventRequest) returns (HookEventResponse);
  rpc ListActiveSessions(ListActiveSessionsRequest) returns (ListActiveSessionsResponse);
  rpc TriggerScan(TriggerScanRequest) returns (TriggerScanResponse);
  rpc SubscribeRegistry(SubscribeRegistryRequest) returns (stream RegistryEvent);
  rpc RenameSession(RenameSessionRequest) returns (RenameSessionResponse);
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);
  rpc UpdateSessionSettings(UpdateSessionSettingsRequest) returns (UpdateSessionSettingsResponse);
  rpc UpdateGlobalSettings(UpdateGlobalSettingsRequest) returns (UpdateGlobalSettingsResponse);
  rpc ListBridges(ListBridgesRequest) returns (ListBridgesResponse);
  rpc TailTranscript(TailTranscriptRequest) returns (stream TranscriptLine);
  rpc SendToSession(SendToSessionRequest) returns (SendToSessionResponse);
}

message AcquireSessionRequest {
  string session_name = 1;
  string wrapper_id = 2;
}

message AcquireSessionResponse {
  string fake_home = 1;
  string real_claude = 2;
  string model = 3;
  string settings_file = 4;
}

message ReleaseSessionRequest {
  string wrapper_id = 1;
}

message ReleaseSessionResponse {}

message HookEventRequest {
  bytes payload = 1;
  string wrapper_id = 2;
  bytes raw_json = 3;
}

message HookEventResponse {
  int32 exit_code = 1;
}

message ListActiveSessionsRequest {}

message ListActiveSessionsResponse {
  repeated ActiveSession sessions = 1;
}

message ActiveSession {
  string session_name = 1;
  string wrapper_id = 2;
}

message TriggerScanRequest {}

message TriggerScanResponse {
  int32 adopted_count = 1;
  repeated string adopted_names = 2;
}

message SubscribeRegistryRequest {}

message RegistryEvent {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    SESSION_ADOPTED = 1;
    SESSION_UPDATED = 2;
    SESSION_DELETED = 3;
    SESSION_RENAMED = 4;
    BRIDGE_OPENED = 5;
    BRIDGE_CLOSED = 6;
  }
  Kind kind = 1;
  string session_name = 2;
  string session_id = 3;
  string old_name = 4;
  string bridge_session_id = 5;
  string bridge_url = 6;
}

message RenameSessionRequest {
  string old_name = 1;
  string new_name = 2;
}

message RenameSessionResponse {}

message DeleteSessionRequest {
  string name = 1;
}

message DeleteSessionResponse {}

message Settings {
  string model = 1;
  string effort_level = 2;
  string output_style = 3;
  bool   remote_control = 4;
}

message UpdateSessionSettingsRequest {
  string name = 1;
  Settings settings = 2;
  // Field names from Settings to apply. Empty mask means apply all
  // non zero fields. Listing remote_control alone toggles just that
  // value without overwriting model or anything else.
  repeated string update_mask = 3;
}

message UpdateSessionSettingsResponse {}

message GlobalDefaults {
  bool remote_control = 1;
}

message UpdateGlobalSettingsRequest {
  GlobalDefaults defaults = 1;
  repeated string update_mask = 2;
}

message UpdateGlobalSettingsResponse {}

message Bridge {
  string session_id = 1;
  int64  pid = 2;
  string bridge_session_id = 3;
  string url = 4;
}

message ListBridgesRequest {}

message ListBridgesResponse {
  repeated Bridge bridges = 1;
}

message TailTranscriptRequest {
  string session_id = 1;
  // start_at_offset = 0 means stream future lines only.
  int64 start_at_offset = 2;
}

message TranscriptLine {
  int64 byte_offset = 1;
  string raw_jsonl = 2;
  string role = 3;
  string text = 4;
  // Unix nanoseconds. Avoids pulling in google.protobuf.Timestamp for one field.
  int64 timestamp_nanos = 5;
}

message SendToSessionRequest {
  string session_id = 1;
  string text = 2;
}

message SendToSessionResponse {
  int32 bytes_written = 1;
  bool delivered = 2;
}
