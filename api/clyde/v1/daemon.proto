syntax = "proto3";

package clyde.v1;

service ClydeService {
  rpc AcquireSession(AcquireSessionRequest) returns (AcquireSessionResponse);
  rpc ReleaseSession(ReleaseSessionRequest) returns (ReleaseSessionResponse);
  rpc HookEvent(HookEventRequest) returns (HookEventResponse);
  rpc ListActiveSessions(ListActiveSessionsRequest) returns (ListActiveSessionsResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc GetSessionDetail(GetSessionDetailRequest) returns (GetSessionDetailResponse);
  rpc GetSessionExportStats(GetSessionExportStatsRequest) returns (GetSessionExportStatsResponse);
  rpc TriggerScan(TriggerScanRequest) returns (TriggerScanResponse);
  rpc ReloadDaemon(ReloadDaemonRequest) returns (ReloadDaemonResponse);
  rpc SubscribeRegistry(SubscribeRegistryRequest) returns (stream SubscribeRegistryResponse);
  rpc GetProviderStats(GetProviderStatsRequest) returns (GetProviderStatsResponse);
  rpc SubscribeProviderStats(SubscribeProviderStatsRequest) returns (stream ProviderStatsEvent);
  rpc RenameSession(RenameSessionRequest) returns (RenameSessionResponse);
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);
  rpc UpdateSessionMetadata(UpdateSessionMetadataRequest) returns (UpdateSessionMetadataResponse);
  rpc UpdateSessionSettings(UpdateSessionSettingsRequest) returns (UpdateSessionSettingsResponse);
  rpc UpdateGlobalSettings(UpdateGlobalSettingsRequest) returns (UpdateGlobalSettingsResponse);
  rpc ListConfigControls(ListConfigControlsRequest) returns (ListConfigControlsResponse);
  rpc UpdateConfigControl(UpdateConfigControlRequest) returns (UpdateConfigControlResponse);
  rpc StartRemoteSession(StartRemoteSessionRequest) returns (StartRemoteSessionResponse);
  rpc ListBridges(ListBridgesRequest) returns (ListBridgesResponse);
  rpc TailTranscript(TailTranscriptRequest) returns (stream TailTranscriptResponse);
  rpc SendToSession(SendToSessionRequest) returns (SendToSessionResponse);
  rpc CompactPreview(CompactRunRequest) returns (stream CompactEvent);
  rpc CompactApply(CompactRunRequest) returns (stream CompactEvent);
  rpc CompactUndo(CompactUndoRequest) returns (CompactUndoResponse);
  rpc ProbeContextUsage(ProbeContextUsageRequest) returns (ProbeContextUsageResponse);
}

message AcquireSessionRequest {
  string session_name = 1;
  string wrapper_id = 2;
}

message AcquireSessionResponse {
  string fake_home = 1;
  string real_claude = 2;
  string model = 3;
  string settings_file = 4;
}

message ReleaseSessionRequest {
  string wrapper_id = 1;
}

message ReleaseSessionResponse {}

message HookEventRequest {
  bytes payload = 1;
  string wrapper_id = 2;
  bytes raw_json = 3;
}

message HookEventResponse {
  int32 exit_code = 1;
}

message ListActiveSessionsRequest {}

message ListActiveSessionsResponse {
  repeated ActiveSession sessions = 1;
}

message ActiveSession {
  string session_name = 1;
  string wrapper_id = 2;
}

message ListSessionsRequest {}

message SessionSummary {
  string name = 1;
  string metadata_name = 2;
  string session_id = 3;
  string transcript_path = 4;
  string work_dir = 5;
  int64 created_nanos = 6;
  int64 last_accessed_nanos = 7;
  string parent_session = 8;
  bool is_forked_session = 9;
  bool is_incognito = 10;
  repeated string previous_session_ids = 11;
  string context = 12;
  bool has_custom_output_style = 13;
  string workspace_root = 14;
  int32 context_message_count = 15;
  string display_title = 16;
  string model = 17;
  bool remote_control = 18;
  int32 message_count = 19;
  int64 transcript_size_bytes = 20;
  int64 last_activity_nanos = 21;
  Bridge bridge = 22;
  int32 context_total_tokens = 23;
  int32 context_max_tokens = 24;
  int32 context_percentage = 25;
  int32 context_messages_tokens = 26;
  bool context_usage_loaded = 27;
  string context_usage_status = 28;
}

message ListSessionsResponse {
  repeated SessionSummary sessions = 1;
  bool global_remote_control = 2;
}

message DetailMessage {
  string role = 1;
  string text = 2;
  int64 timestamp_nanos = 3;
}

message ToolUse {
  string name = 1;
  int32 count = 2;
}

message GetSessionDetailRequest {
  string session_name = 1;
}

message GetSessionDetailResponse {
  string session_name = 1;
  string model = 2;
  repeated DetailMessage recent_messages = 3;
  repeated DetailMessage all_messages = 4;
  repeated ToolUse tools = 5;
  int32 total_messages = 6;
  int32 visible_tokens_estimate = 7;
  int32 last_message_tokens = 8;
  int32 compaction_count = 9;
  int32 last_pre_compact_tokens = 10;
  int64 transcript_size_bytes = 11;
  int64 last_activity_nanos = 12;
}

message GetSessionExportStatsRequest {
  string session_name = 1;
}

message GetSessionExportStatsResponse {
  string session_name = 1;
  int32 visible_tokens_estimate = 2;
  int32 visible_messages = 3;
  int32 user_messages = 4;
  int32 assistant_messages = 5;
  int32 tool_result_messages = 6;
  int32 tool_calls = 7;
  int32 system_prompts = 8;
  int32 compactions = 9;
  int64 transcript_size_bytes = 10;
}

message TriggerScanRequest {}

message TriggerScanResponse {
  int32 adopted_count = 1;
  repeated string adopted_names = 2;
}

message ReloadDaemonRequest {}

message ReloadDaemonResponse {
  int32 active_sessions = 1;
  bool binary_reloaded = 2;
  int64 new_pid = 3;
}

message SubscribeRegistryRequest {}

message SubscribeRegistryResponse {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_SESSION_ADOPTED = 1;
    KIND_SESSION_UPDATED = 2;
    KIND_SESSION_DELETED = 3;
    KIND_SESSION_RENAMED = 4;
    KIND_BRIDGE_OPENED = 5;
    KIND_BRIDGE_CLOSED = 6;
    KIND_GLOBAL_SETTINGS_UPDATED = 7;
    KIND_CLYDE_BINARY_UPDATED = 8;
  }
  Kind kind = 1;
  string session_name = 2;
  string session_id = 3;
  string old_name = 4;
  string bridge_session_id = 5;
  string bridge_url = 6;
  SessionSummary session_summary = 7;
  bool global_remote_control = 8;
  string binary_path = 9;
  string binary_reason = 10;
  string binary_hash = 11;
}

message GetProviderStatsRequest {}

message SubscribeProviderStatsRequest {}

message ProviderStats {
  string provider = 1;
  int32 requests = 2;
  int32 inflight = 3;
  int32 streaming = 4;
  int64 input_tokens = 5;
  int64 output_tokens = 6;
  int64 cache_read_tokens = 7;
  int64 cache_creation_tokens = 8;
  double hit_ratio = 9;
  int64 estimated_cost_microcents = 10;
  int64 last_seen_unix = 11;
  string error = 12;
  int64 derived_cache_creation_tokens = 13;
}

message GetProviderStatsResponse {
  repeated ProviderStats providers = 1;
  int64 loaded_at_unix = 2;
}

message ProviderStatsEvent {
  ProviderStats stats = 1;
  int64 emitted_at_unix = 2;
}

message RenameSessionRequest {
  string old_name = 1;
  string new_name = 2;
}

message RenameSessionResponse {}

message DeleteSessionRequest {
  string name = 1;
}

message DeleteSessionResponse {}

message UpdateSessionMetadataRequest {
  string name = 1;
  string workspace_root = 2;
}

message UpdateSessionMetadataResponse {}

message Settings {
  string model = 1;
  string effort_level = 2;
  string output_style = 3;
  bool   remote_control = 4;
}

message UpdateSessionSettingsRequest {
  string name = 1;
  Settings settings = 2;
  // Field names from Settings to apply. An empty mask applies every
  // non zero field. Listing remote_control alone toggles just that
  // value without overwriting model or anything else.
  repeated string update_mask = 3;
}

message UpdateSessionSettingsResponse {}

message GlobalDefaults {
  bool remote_control = 1;
}

message UpdateGlobalSettingsRequest {
  GlobalDefaults defaults = 1;
  repeated string update_mask = 2;
}

message UpdateGlobalSettingsResponse {}

enum ConfigControlType {
  CONFIG_CONTROL_TYPE_UNSPECIFIED = 0;
  CONFIG_CONTROL_TYPE_BOOL = 1;
  CONFIG_CONTROL_TYPE_ENUM = 2;
  CONFIG_CONTROL_TYPE_STRING = 3;
  CONFIG_CONTROL_TYPE_PATH = 4;
}

message ConfigControlOption {
  string value = 1;
  string label = 2;
  string description = 3;
}

message ConfigControl {
  string key = 1;
  string section = 2;
  string label = 3;
  string description = 4;
  ConfigControlType type = 5;
  string value = 6;
  string default_value = 7;
  repeated ConfigControlOption options = 8;
  bool sensitive = 9;
  bool read_only = 10;
}

message ListConfigControlsRequest {}

message ListConfigControlsResponse {
  repeated ConfigControl controls = 1;
}

message UpdateConfigControlRequest {
  string key = 1;
  string value = 2;
}

message UpdateConfigControlResponse {
  ConfigControl control = 1;
}

message StartRemoteSessionRequest {
  string session_name = 1;
  string basedir = 2;
  bool incognito = 3;
}

message StartRemoteSessionResponse {
  enum LaunchState {
    LAUNCH_STATE_UNSPECIFIED = 0;
    LAUNCH_STATE_LAUNCHING = 1;
    LAUNCH_STATE_FAILED = 2;
  }
  string session_name = 1;
  string session_id = 2;
  LaunchState launch_state = 3;
}

message Bridge {
  string session_id = 1;
  int64  pid = 2;
  string bridge_session_id = 3;
  string url = 4;
}

message ListBridgesRequest {}

message ListBridgesResponse {
  repeated Bridge bridges = 1;
}

message TailTranscriptRequest {
  string session_id = 1;
  // start_at_offset = 0 streams future lines only.
  int64 start_at_offset = 2;
}

message TailTranscriptResponse {
  int64 byte_offset = 1;
  string raw_jsonl = 2;
  string role = 3;
  string text = 4;
  // Unix nanoseconds. Avoids pulling in google.protobuf.Timestamp for one field.
  int64 timestamp_nanos = 5;
}

message SendToSessionRequest {
  string session_id = 1;
  string text = 2;
}

message SendToSessionResponse {
  int32 bytes_written = 1;
  bool delivered = 2;
}

message ProbeContextUsageRequest {
  string session_name = 1;
}

message ContextUsageCategory {
  string name = 1;
  int32 tokens = 2;
  string color = 3;
  bool is_deferred = 4;
}

message ProbeContextUsageResponse {
  string session_name = 1;
  string session_id = 2;
  string model = 3;
  int32 total_tokens = 4;
  int32 max_tokens = 5;
  int32 percentage = 6;
  repeated ContextUsageCategory categories = 7;
}

message CompactStrippers {
  bool thinking = 1;
  bool images = 2;
  bool tools = 3;
  bool chat = 4;
}

message CompactRunRequest {
  string session_name = 1;
  int32 target_tokens = 2;
  int32 reserved_tokens = 3;
  string model = 4;
  bool model_explicit = 5;
  CompactStrippers strippers = 6;
  bool summarize = 7;
  bool force = 8;
}

message CompactUpfront {
  string session_name = 1;
  string session_id = 2;
  string model = 3;
  int32 current_total = 4;
  int32 max_tokens = 5;
  int32 target_tokens = 6;
  int32 static_floor = 7;
  int32 reserved_tokens = 8;
  int32 thinking_blocks = 9;
  int32 image_blocks = 10;
  int32 tool_pairs = 11;
  int32 chat_turns = 12;
  string strippers_text = 13;
  string calibration_date = 14;
}

message CompactIteration {
  int32 iteration = 1;
  string step = 2;
  int32 tail_tokens = 3;
  int32 ctx_total = 4;
  int32 delta = 5;
  bool thinking_dropped = 6;
  bool images_placeholder = 7;
  int32 tools_full = 8;
  int32 tools_line_only = 9;
  int32 tools_dropped = 10;
  int32 chat_turns_total = 11;
  int32 chat_turns_dropped = 12;
}

message CompactApplyMutation {
  string boundary_uuid = 1;
  string synthetic_uuid = 2;
  int64 pre_apply_offset = 3;
  int64 post_apply_offset = 4;
  string snapshot_path = 5;
  string ledger_path = 6;
}

message CompactFinal {
  int32 baseline_tail = 1;
  int32 final_tail = 2;
  bool hit_target = 3;
  int32 target_tokens = 4;
  int32 static_floor = 5;
  int32 reserved_tokens = 6;
  string transcript_path = 7;
}

message CompactEvent {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_STATUS = 1;
    KIND_UPFRONT = 2;
    KIND_ITERATION = 3;
    KIND_FINAL = 4;
    KIND_APPLY_MUTATION = 5;
  }

  int32 sequence = 1;
  Kind kind = 2;
  string message = 3;
  CompactUpfront upfront = 4;
  CompactIteration iteration = 5;
  CompactFinal final = 6;
  CompactApplyMutation apply_mutation = 7;
}

message CompactUndoRequest {
  string session_name = 1;
}

message CompactUndoResponse {
  string session_name = 1;
  string session_id = 2;
  string transcript_path = 3;
  string ledger_path = 4;
  string applied_at = 5;
  int32 target_tokens = 6;
  string boundary_uuid = 7;
  string synthetic_uuid = 8;
  string snapshot_path = 9;
  int64 pre_apply_offset = 10;
  int64 post_undo_bytes = 11;
}
