syntax = "proto3";

package clyde.v1;

option go_package = "goodkind.io/clyde/api/clyde/v1;clydev1";

import "clyde/v1/daemon/bridge.proto";
import "clyde/v1/daemon/provider.proto";

message AcquireSessionRequest {
  string session_name = 1;
  string wrapper_id = 2;
}

message AcquireSessionResponse {
  string fake_home = 1;
  string real_claude = 2;
  string model = 3;
  string settings_file = 4;
}

message ReleaseSessionRequest {
  string wrapper_id = 1;
}

message ReleaseSessionResponse {}

message HookEventRequest {
  bytes payload = 1;
  string wrapper_id = 2;
  bytes raw_json = 3;
}

message HookEventResponse {
  int32 exit_code = 1;
}

message ListActiveSessionsRequest {}

message ListActiveSessionsResponse {
  repeated ActiveSession sessions = 1;
}

message ActiveSession {
  string session_name = 1;
  string wrapper_id = 2;
}

message ListSessionsRequest {}

message SessionSummary {
  string name = 1;
  string metadata_name = 2;
  string session_id = 3;
  string transcript_path = 4;
  string work_dir = 5;
  int64 created_nanos = 6;
  int64 last_accessed_nanos = 7;
  string parent_session = 8;
  bool is_forked_session = 9;
  bool is_incognito = 10;
  repeated string previous_session_ids = 11;
  string context = 12;
  bool has_custom_output_style = 13;
  string workspace_root = 14;
  int32 context_message_count = 15;
  string display_title = 16;
  string model = 17;
  bool remote_control = 18;
  int32 message_count = 19;
  int64 transcript_size_bytes = 20;
  int64 last_activity_nanos = 21;
  Bridge bridge = 22;
  int32 context_total_tokens = 23;
  int32 context_max_tokens = 24;
  int32 context_percentage = 25;
  int32 context_messages_tokens = 26;
  bool context_usage_loaded = 27;
  string context_usage_status = 28;
  string provider = 29;
  ProviderRuntimeBoundary runtime = 30;
}

message ListSessionsResponse {
  repeated SessionSummary sessions = 1;
  bool global_remote_control = 2;
}

message DetailMessage {
  string role = 1;
  string text = 2;
  int64 timestamp_nanos = 3;
}

message ToolUse {
  string name = 1;
  int32 count = 2;
}

message GetSessionDetailRequest {
  string session_name = 1;
}

message GetSessionDetailResponse {
  string session_name = 1;
  string model = 2;
  repeated DetailMessage recent_messages = 3;
  repeated DetailMessage all_messages = 4;
  repeated ToolUse tools = 5;
  int32 total_messages = 6;
  int32 visible_tokens_estimate = 7;
  int32 last_message_tokens = 8;
  int32 compaction_count = 9;
  int32 last_pre_compact_tokens = 10;
  int64 transcript_size_bytes = 11;
  int64 last_activity_nanos = 12;
  string provider = 13;
  ProviderRuntimeBoundary runtime = 14;
}

message GetSessionExportStatsRequest {
  string session_name = 1;
}

message GetSessionExportStatsResponse {
  string session_name = 1;
  int32 visible_tokens_estimate = 2;
  int32 visible_messages = 3;
  int32 user_messages = 4;
  int32 assistant_messages = 5;
  int32 tool_result_messages = 6;
  int32 tool_calls = 7;
  int32 system_prompts = 8;
  int32 compactions = 9;
  int64 transcript_size_bytes = 10;
}

enum SessionExportFormat {
  SESSION_EXPORT_FORMAT_UNSPECIFIED = 0;
  SESSION_EXPORT_FORMAT_MARKDOWN = 1;
  SESSION_EXPORT_FORMAT_HTML = 2;
  SESSION_EXPORT_FORMAT_JSON = 3;
  SESSION_EXPORT_FORMAT_PLAIN_TEXT = 4;
}

enum SessionExportWhitespaceCompression {
  SESSION_EXPORT_WHITESPACE_COMPRESSION_UNSPECIFIED = 0;
  SESSION_EXPORT_WHITESPACE_COMPRESSION_PRESERVE = 1;
  SESSION_EXPORT_WHITESPACE_COMPRESSION_TIDY = 2;
  SESSION_EXPORT_WHITESPACE_COMPRESSION_COMPACT = 3;
  SESSION_EXPORT_WHITESPACE_COMPRESSION_DENSE = 4;
}

message ExportSessionRequest {
  string session_name = 1;
  SessionExportFormat format = 2;
  int32 history_start = 3;
  SessionExportWhitespaceCompression whitespace_compression = 4;
  bool include_chat = 5;
  bool include_thinking = 6;
  bool include_system_prompts = 7;
  bool include_tool_calls = 8;
  bool include_tool_outputs = 9;
  bool include_raw_json_metadata = 10;
}

message ExportSessionResponse {
  bytes body = 1;
}

message RenameSessionRequest {
  string old_name = 1;
  string new_name = 2;
}

message RenameSessionResponse {}

message DeleteSessionRequest {
  string name = 1;
}

message DeleteSessionResponse {}

message UpdateSessionMetadataRequest {
  string name = 1;
  string workspace_root = 2;
}

message UpdateSessionMetadataResponse {}
