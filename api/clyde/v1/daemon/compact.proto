syntax = "proto3";

package clyde.v1;

option go_package = "goodkind.io/clyde/api/clyde/v1;clydev1";

message CompactStrippers {
  bool thinking = 1;
  bool images = 2;
  bool tools = 3;
  bool chat = 4;
}

message CompactRunRequest {
  string session_name = 1;
  int32 target_tokens = 2;
  int32 reserved_tokens = 3;
  string model = 4;
  bool model_explicit = 5;
  CompactStrippers strippers = 6;
  bool summarize = 7;
  bool force = 8;
}

message CompactUpfront {
  string session_name = 1;
  string session_id = 2;
  string model = 3;
  int32 current_total = 4;
  int32 max_tokens = 5;
  int32 target_tokens = 6;
  int32 static_floor = 7;
  int32 reserved_tokens = 8;
  int32 thinking_blocks = 9;
  int32 image_blocks = 10;
  int32 tool_pairs = 11;
  int32 chat_turns = 12;
  string strippers_text = 13;
  string calibration_date = 14;
}

message CompactIteration {
  int32 iteration = 1;
  string step = 2;
  int32 tail_tokens = 3;
  int32 ctx_total = 4;
  int32 delta = 5;
  bool thinking_dropped = 6;
  bool images_placeholder = 7;
  int32 tools_full = 8;
  int32 tools_line_only = 9;
  int32 tools_dropped = 10;
  int32 chat_turns_total = 11;
  int32 chat_turns_dropped = 12;
}

message CompactApplyMutation {
  string boundary_uuid = 1;
  string synthetic_uuid = 2;
  int64 pre_apply_offset = 3;
  int64 post_apply_offset = 4;
  string snapshot_path = 5;
  string ledger_path = 6;
}

message CompactFinal {
  int32 baseline_tail = 1;
  int32 final_tail = 2;
  bool hit_target = 3;
  int32 target_tokens = 4;
  int32 static_floor = 5;
  int32 reserved_tokens = 6;
  string transcript_path = 7;
}

message CompactEvent {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_STATUS = 1;
    KIND_UPFRONT = 2;
    KIND_ITERATION = 3;
    KIND_FINAL = 4;
    KIND_APPLY_MUTATION = 5;
  }

  int32 sequence = 1;
  Kind kind = 2;
  string message = 3;
  CompactUpfront upfront = 4;
  CompactIteration iteration = 5;
  CompactFinal final = 6;
  CompactApplyMutation apply_mutation = 7;
}

message CompactUndoRequest {
  string session_name = 1;
}

message CompactUndoResponse {
  string session_name = 1;
  string session_id = 2;
  string transcript_path = 3;
  string ledger_path = 4;
  string applied_at = 5;
  int32 target_tokens = 6;
  string boundary_uuid = 7;
  string synthetic_uuid = 8;
  string snapshot_path = 9;
  int64 pre_apply_offset = 10;
  int64 post_undo_bytes = 11;
}
