syntax = "proto3";

package clyde.v1;

option go_package = "goodkind.io/clyde/api/clyde/v1;clydev1";

import "clyde/v1/daemon/session.proto";

message TriggerScanRequest {}

message TriggerScanResponse {
  int32 adopted_count = 1;
  repeated string adopted_names = 2;
}

message ReloadDaemonRequest {}

message ReloadDaemonResponse {
  int32 active_sessions = 1;
  bool binary_reloaded = 2;
  int64 new_pid = 3;
}

message SubscribeRegistryRequest {}

message SubscribeRegistryResponse {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_SESSION_ADOPTED = 1;
    KIND_SESSION_UPDATED = 2;
    KIND_SESSION_DELETED = 3;
    KIND_SESSION_RENAMED = 4;
    KIND_BRIDGE_OPENED = 5;
    KIND_BRIDGE_CLOSED = 6;
    KIND_GLOBAL_SETTINGS_UPDATED = 7;
    KIND_CLYDE_BINARY_UPDATED = 8;
  }
  Kind kind = 1;
  string session_name = 2;
  string session_id = 3;
  string old_name = 4;
  string bridge_session_id = 5;
  string bridge_url = 6;
  SessionSummary session_summary = 7;
  bool global_remote_control = 8;
  string binary_path = 9;
  string binary_reason = 10;
  string binary_hash = 11;
}
