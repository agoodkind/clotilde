syntax = "proto3";

package clyde.v1;

option go_package = "goodkind.io/clyde/api/clyde/v1;clydev1";

message Bridge {
  string session_id = 1;
  int64 pid = 2;
  string bridge_session_id = 3;
  string url = 4;
}

message ListBridgesRequest {}

message ListBridgesResponse {
  repeated Bridge bridges = 1;
}

message TailTranscriptRequest {
  string session_id = 1;
  // start_at_offset = 0 streams future lines only.
  int64 start_at_offset = 2;
  string provider = 3;
  string session_name = 4;
}

message TailTranscriptResponse {
  int64 byte_offset = 1;
  string raw_jsonl = 2;
  string role = 3;
  string text = 4;
  // Unix nanoseconds. Avoids pulling in google.protobuf.Timestamp for one field.
  int64 timestamp_nanos = 5;
  string provider = 6;
  string session_id = 7;
  string session_name = 8;
}

message SendToSessionRequest {
  string session_id = 1;
  string text = 2;
  string provider = 3;
  string session_name = 4;
}

message SendToSessionResponse {
  int32 bytes_written = 1;
  bool delivered = 2;
}
