syntax = "proto3";

package clyde.v1;

option go_package = "goodkind.io/clyde/api/clyde/v1;clydev1";

message ProbeContextUsageRequest {
  string session_name = 1;
}

message ContextUsageCategory {
  string name = 1;
  int32 tokens = 2;
  string color = 3;
  bool is_deferred = 4;
}

message ProbeContextUsageResponse {
  string session_name = 1;
  string session_id = 2;
  string model = 3;
  int32 total_tokens = 4;
  int32 max_tokens = 5;
  int32 percentage = 6;
  repeated ContextUsageCategory categories = 7;
}
