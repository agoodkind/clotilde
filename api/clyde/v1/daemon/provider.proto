syntax = "proto3";

package clyde.v1;

option go_package = "goodkind.io/clyde/api/clyde/v1;clydev1";

message ProviderSessionIdentity {
  string provider = 1;
  string session_id = 2;
}

message SessionHistoryBoundary {
  ProviderSessionIdentity current = 1;
  repeated ProviderSessionIdentity previous = 2;
  string primary_artifact = 3;
  bool readable = 4;
  bool exportable = 5;
}

message LiveSessionBoundary {
  ProviderSessionIdentity current = 1;
  bool tail_readable = 2;
  bool input_writable = 3;
  bool remote_control = 4;
  string bridge_session_id = 5;
  string bridge_url = 6;
}

message ProviderRuntimeBoundary {
  SessionHistoryBoundary history = 1;
  LiveSessionBoundary live = 2;
}

message GetProviderStatsRequest {}

message SubscribeProviderStatsRequest {}

message ProviderStats {
  string provider = 1;
  int32 requests = 2;
  int32 inflight = 3;
  int32 streaming = 4;
  int64 input_tokens = 5;
  int64 output_tokens = 6;
  int64 cache_read_tokens = 7;
  int64 cache_creation_tokens = 8;
  double hit_ratio = 9;
  int64 estimated_cost_microcents = 10;
  int64 last_seen_unix = 11;
  string error = 12;
  int64 derived_cache_creation_tokens = 13;
}

message GetProviderStatsResponse {
  repeated ProviderStats providers = 1;
  int64 loaded_at_unix = 2;
}

message ProviderStatsEvent {
  ProviderStats stats = 1;
  int64 emitted_at_unix = 2;
}

message StartRemoteSessionRequest {
  string session_name = 1;
  string basedir = 2;
  bool incognito = 3;
}

message StartRemoteSessionResponse {
  enum LaunchState {
    LAUNCH_STATE_UNSPECIFIED = 0;
    LAUNCH_STATE_LAUNCHING = 1;
    LAUNCH_STATE_FAILED = 2;
  }
  string session_name = 1;
  string session_id = 2;
  LaunchState launch_state = 3;
}

message LiveSession {
  string provider = 1;
  string session_name = 2;
  string session_id = 3;
  string status = 4;
  string basedir = 5;
  string url = 6;
  int64 started_at_nanos = 7;
  bool supports_send = 8;
  bool supports_stream = 9;
  bool supports_stop = 10;
}

message ListLiveSessionsRequest {}

message ListLiveSessionsResponse {
  repeated LiveSession sessions = 1;
}

message StartLiveSessionRequest {
  string provider = 1;
  string name = 2;
  string basedir = 3;
  string model = 4;
  string effort = 5;
  bool incognito = 6;
}

message StartLiveSessionResponse {
  LiveSession session = 1;
}

message SendLiveSessionRequest {
  string session_id = 1;
  string text = 2;
}

message SendLiveSessionResponse {
  bool accepted = 1;
}

message StreamLiveSessionRequest {
  string session_id = 1;
}

message StreamLiveSessionResponse {
  string session_id = 1;
  string kind = 2;
  string role = 3;
  string text = 4;
  int64 timestamp_nanos = 5;
}

message StopLiveSessionRequest {
  string session_id = 1;
}

message StopLiveSessionResponse {
  bool stopped = 1;
}

message AcquireForegroundSessionRequest {
  string session_name = 1;
  string session_id = 2;
  string provider = 3;
}

message AcquireForegroundSessionResponse {
  string lease_token = 1;
  string provider = 2;
  string session_name = 3;
  string session_id = 4;
  bool should_restore = 5;
  string restore_reason = 6;
}

message ReleaseForegroundSessionRequest {
  string lease_token = 1;
  string exit_state = 2;
}

message ReleaseForegroundSessionResponse {
  bool restored = 1;
  LiveSession live_session = 2;
}
