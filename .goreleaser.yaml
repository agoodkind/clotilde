# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: clyde

before:
  hooks:
    - go mod tidy

builds:
  - id: clyde
    main: ./cmd/clyde
    binary: clyde
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_ {{- .Os }}_ {{- .Arch }}
    ids:
      - clyde

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: agoodkind
    name: clyde
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
