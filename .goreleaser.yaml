# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: clyde

dist: .goreleaser-dist

before:
  hooks:
    - go mod download

builds:
  - id: clyde
    main: ./cmd/clyde
    binary: clyde
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X goodkind.io/gklog/version.Version={{ .Version }}
      - -X goodkind.io/gklog/version.Commit={{ .ShortCommit }}
      - -X goodkind.io/gklog/version.BuildTime={{ .Date }}
      - -X goodkind.io/gklog/version.Dirty=false

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    ids:
      - clyde

notarize:
  macos:
    - enabled: '{{ or (isEnvSet "MACOS_SIGN_P12") (isEnvSet "MACOS_SIGNING_CERTIFICATE") }}'
      ids:
        - clyde
      sign:
        certificate: '{{ if isEnvSet "MACOS_SIGN_P12" }}{{ .Env.MACOS_SIGN_P12 }}{{ else }}{{ .Env.MACOS_SIGNING_CERTIFICATE }}{{ end }}'
        password: '{{ if isEnvSet "MACOS_SIGN_PASSWORD" }}{{ .Env.MACOS_SIGN_PASSWORD }}{{ else }}{{ .Env.MACOS_SIGNING_CERTIFICATE_PASSWORD }}{{ end }}'
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 20m

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: agoodkind
    name: clyde
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
